[backdrop]
enabled = true
tint_intensity = 0.0

[bar.default]
background_opacity = 0.89999997988343239
center = [ "media" ]
end = [ "notifications", "network", "bluetooth", "volume", "battery", "clock", "tray" ]
margin_ends = 0
padding = 8
position = "left"
radius = 20
radius_bottom_left = 0
radius_top_left = 0
reserve_space = false
smart_auto_hide = true
start = [ "control-center", "workspaces" ]
thickness = 42

[battery]
warning_threshold = 15

[config]

[control_center]
hidden_tabs = [ "media", "audio", "power", "weather", "calendar", "notifications", "screen-time" ]
sidebar_section = "none"
width = 750

    [[control_center.shortcuts]]
    type = "wifi"

    [[control_center.shortcuts]]
    type = "bluetooth"

    [[control_center.shortcuts]]
    type = "caffeine"

    [[control_center.shortcuts]]
    type = "nightlight"

[desktop_widgets]
enabled = false

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = false
    timeout = 600.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = false
    timeout = 1800.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 600.0

[location]
custom_schedule = true
sunrise = "06:00"
sunset = "22:00"

[lockscreen]
blurred_desktop = true
tint_intensity = 0.0

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-1", "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 800.0
    cy = 881.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[nightlight]
enabled = true

[notification]
layer = "overlay"

[osd]
position = "bottom_center"

[plugins]
enabled = [ "blackbartblues/keymap" ]

[shell]
button_borders = false
input_borders = false
niri_overview_type_to_launch_enabled = true
password_style = "random"
polkit_agent = true
popup_borders = false
screen_time_enabled = true
show_location = false

    [shell.launcher]
    categories = false
    compact = true
    fetch_exchange_rates = false
    show_icons = false
    sort_by_usage = false

        [shell.launcher.providers.calculator]
        global = false

    [shell.panel]
    clipboard_placement = "attached"
    launcher_placement = "attached"
    open_near_click_clipboard = true
    open_near_click_control_center = true
    open_near_click_launcher = true
    open_near_click_session = true
    open_near_click_wallpaper = true
    polkit_placement = "attached"
    session_placement = "floating"

    [shell.screenshot]
    copy_to_clipboard = false
    freeze_screen = false
    save_to_file = false

    [shell.session]
    grid = true

        [[shell.session.actions]]
        action = "lock"
        countdown_seconds = 0.0
        enabled = true
        shortcut = "1"
        variant = "default"

        [[shell.session.actions]]
        action = "logout"
        countdown_seconds = 5.0
        enabled = true
        shortcut = "2"
        variant = "default"

        [[shell.session.actions]]
        action = "command"
        command = "systemctl hibernate"
        countdown_seconds = 5.0
        enabled = true
        glyph = "zzz"
        label = "Hibernate"
        shortcut = "3"
        variant = "default"

        [[shell.session.actions]]
        action = "suspend"
        countdown_seconds = 5.0
        enabled = true
        shortcut = "4"
        variant = "default"

        [[shell.session.actions]]
        action = "reboot"
        countdown_seconds = 5.0
        enabled = true
        shortcut = "5"
        variant = "default"

        [[shell.session.actions]]
        action = "shutdown"
        countdown_seconds = 5.0
        enabled = true
        shortcut = "6"
        variant = "default"

[systemd.monitor]
enabled = true

[templates]

[theme]
source = "wallpaper"
wallpaper_scheme = "m3-tonal-spot"

[wallpaper]
directory = "/home/u/Pictures/wallpapers"
transition_on_startup = true

    [wallpaper.default]
    path = "/home/u/.cache/wallpaper"

    [wallpaper.last]
    path = "/home/u/.cache/wallpaper"

[weather]
enabled = false

[widget.battery]
display_mode = "graphic"
hide_when_full = true
show_label = false

[widget.bluetooth]
enabled = false

[widget.brightness]
show_label = false

[widget.clock]
format = "{:%H:%m}"

[widget.control-center]
custom_image = "/home/u/.config/etc/NixOS.svg"
custom_image_colorize = true
scale = 1.4000000000000001

[widget.media]
art_size = 30
hide_when_no_media = true

[widget.network]
enabled = false

[widget.tray]
drawer = true

[widget.volume]
show_label = false

[widget.workspaces]
display = "none"
hide_when_empty = true
